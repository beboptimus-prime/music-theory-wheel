<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Music Theory Wheel©</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

    <div id="app">

        <!-- LEFT COLUMN -->
        <aside id="sidebar">

            <div class="control-group">
                <label for="keySelect">SELECT KEY</label>
                <select id="keySelect">
                    <option value="C">C</option>
                    <option value="Db">D♭</option>
                    <option value="D">D</option>
                    <option value="Eb">E♭</option>
                    <option value="E">E</option>
                    <option value="F">F</option>
                    <option value="Gb">G♭</option>
                    <option value="G">G</option>
                    <option value="Ab">A♭</option>
                    <option value="A">A</option>
                    <option value="Bb">B♭</option>
                    <option value="B">B</option>
                </select>
            </div>

            <div class="control-group">
                <label for="chordSymbolSelect">CHORD SYMBOL</label>
                <select id="chordSymbolSelect">
                    <option value="triad">TRIAD</option>
                    <option value="seventh">7th</option>
                    <option value="ninth">9th</option>
                    <option value="eleventh">11th</option>
                    <option value="thirteenth">13th</option>
                </select>
            </div>

            <div id="visibility-toggle-buttons"></div>

        </aside>

        <!-- RIGHT COLUMN -->
        <main id="wheel-container">
            <div id="wheel"></div>
        </main>

        <!-- <label for="show">Show</label>
<select id="show">
  <option value="">normal</option>
  <option value="outlines">outlines</option>
</select> -->

<button id="debugToggle">
    Toggle Layout Debug
</button>


    </div>

</div>

<script src="script.js"></script>

</body>
</html>
