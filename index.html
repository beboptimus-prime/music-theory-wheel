<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Music Theory Wheel©</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

    <div id="app">

        <!-- LEFT COLUMN -->
        <aside id="sidebar">

    <!-- KEY -->
    <div class="sidebar-dropdown">
        <button class="dropdown-toggle">SELECT KEY
            <span class="dropdown-arrow">▼</span>
        </button>

        <div class="dropdown-content" id="keyDropdown">
            <button class="dropdown-option active" data-key="C">C</button>
            <button class="dropdown-option" data-key="D♭">D♭</button>
            <button class="dropdown-option" data-key="D">D</button>
            <button class="dropdown-option" data-key="E♭">E♭</button>
            <button class="dropdown-option" data-key="E">E</button>
            <button class="dropdown-option" data-key="F">F</button>
            <button class="dropdown-option" data-key="F♯">F♯</button>
            <button class="dropdown-option" data-key="G♭">G♭</button>
            <button class="dropdown-option" data-key="G">G</button>
            <button class="dropdown-option" data-key="A♭">A♭</button>
            <button class="dropdown-option" data-key="A">A</button>
            <button class="dropdown-option" data-key="B♭">B♭</button>
            <button class="dropdown-option" data-key="B">B</button>
        </div>

    </div>

    <!-- CHORD EXTENSIONS -->
    <div class="sidebar-dropdown">

        <button class="dropdown-toggle">
            SELECT CHORD EXTENSION
            <span class="dropdown-arrow">▼</span>
        </button>

        <div class="dropdown-content" id="chordDropdown">

            <button class="dropdown-option active" data-chord="triad">TRIAD</button>
            <button class="dropdown-option" data-chord="seventh">7th</button>
            <button class="dropdown-option" data-chord="ninth">9th</button>
            <button class="dropdown-option" data-chord="eleventh">11th</button>
            <button class="dropdown-option" data-chord="thirteenth">13th</button>

        </div>

    </div>

    <!-- SHOW/HIDE -->
    <div class="sidebar-dropdown">

        <button class="dropdown-toggle">
            SHOW / HIDE
            <span class="dropdown-arrow">▼</span>
        </button>

        <div class="dropdown-content">

            <div id="visibility-toggle-buttons"></div>

        </div>

    </div>

</aside>

        <!-- RIGHT COLUMN -->
        <main id="wheel-container">
            <div id="wheel">
            </div>
        </main>

        <!-- <label for="show">Show</label>
<select id="show">
  <option value="">normal</option>
  <option value="outlines">outlines</option>
</select> -->

<button id="debugToggle">
    Toggle Layout Debug
</button>


    </div>

</div>

<script src="script.js"></script>

</body>
</html>
